name: Publish to PyPI

# Triggered when a GitHub release is published.
# Requires a PyPI Trusted Publisher configured for this project:
#   https://pypi.org/manage/project/keygen/settings/publishing/
#   Publisher: GitHub Actions
#   Owner: importt-ant  Repository: keygen
#   Workflow: pypi.yml  Environment: pypi
#
on:
  release:
    types: [published]

jobs:
  pypi:
    uses: importt-ant/github-infra/.github/workflows/python-pypi-publish.yml@main
    with:
      python-version: "3.12"
    secrets: inherit
