name: Generate Documentation

# Runs on docs/** branch pushes or manually.
# Edit `fingerprints` to control which LLM tasks run for this project.
#
on:
  push:
    branches:
      - "docs/**"
  workflow_dispatch:
    inputs:
      model:
        description: "GitHub Models model ID"
        default: "gpt-4o-mini"
        required: false

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  review:
    uses: importt-ant/github-infra/.github/workflows/python-review.yml@main
    with:
      python-version: "3.12"
      model: ${{ github.event.inputs.model || 'gpt-4o-mini' }}

      fingerprints: |
        fingerprints/docstrings-numpy.md
        fingerprints/comments.md
        fingerprints/coding-practices.md
    secrets: inherit
